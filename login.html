<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Easy Access</title>
    <link rel="stylesheet" href="stylelogin.css" />

    <!-- Ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>
<body>

    <!-- MENU SUPERIOR -->
    <header class="top-header">
        <div class="logo">
            <img src="logoroxo.png" alt="Logo Easy Access roxo" class="logo-img">
            <span>EASY ACCESS</span>
        </div>

        <div class="header-right">
            <span class="header-text">Ainda não tem uma conta?</span>
            <a href="cadastro.html" class="btn-cadastrar">CADASTRAR</a>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="login-page">
        <div class="login-container">

            <!-- LADO ESQUERDO -->
            <div class="left-panel">
                <div class="left-content">

                    <h1>
                        Bem-vindo de volta!
                    </h1>

                    <p>
                        Faça login para acessar sua conta
                        e continuar.
                    </p>

                    <div class="illustration">
                        <img src="ilustracaoLogin.png" alt="Ilustração de login">
                    </div>
                </div>
            </div>

            <!-- LADO DIREITO -->
            <div class="right-panel">
                <div class="form-box">
                    <h2>Entrar</h2>

                    <form>
                        <!-- E-mail -->
                        <div class="form-group">
                            <label for="email">E-mail ou CPF</label>
                            <div class="input-wrapper">
                            <img src="iconUsuarioUsuario.png" alt="Usuário" class="input-icon">
                                <input 
                                 type="text"
                                 id="email" 
                                 placeholder="Digite seu e-mail ou CPF"/>
                            </div>
                        </div>

                        <!-- Senha -->
                        <div class="form-group">
                            <label for="senha">Senha</label>
                            <div class="input-wrapper">
                                <img src="iconCadeadoSenha.png" alt="Senha" class="input-icon">
                                    <input
                                    type="password"
                                    id="senha"
                                    placeholder="Digite sua senha"
                                    />
                               <img src="iconOlhoSenha.png" alt="Mostrar senha" class="eye-icon-img">
                            </div>
                        </div>

                        <div class="forgot-password">
                            <a href="#">Esqueceu sua senha?</a>
                        </div>

                        <button type="button" class="btn-login" onclick="entrar()">
                            <i class="fa-solid fa-right-to-bracket"></i>
                            Entrar
                        </button>

                    </form>
                </div>
            </div>

        </div>

        <!-- RODAPÉ -->
        <footer class="footer">
            <p>© 2026 Easy Access. Todos os direitos reservados.</p>
        </footer>
    </main>
<script src="script.js"></script>
</body>
</html>
