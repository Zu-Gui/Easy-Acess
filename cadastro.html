<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Easy Access</title>

    <!-- Fonte Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="stylecadastro.css">
</head>
<body>

    <!-- MENU SUPERIOR -->
    <header class="top-header">
        <div class="logo">
            <img src="logoroxo.png" alt="Logo Easy Access">
            <span>EASY ACCESS</span>
        </div>

        <div class="header-right">
            <span class="header-text">Já possui uma conta?</span>
            <a href="login.html" class="btn-cadastrar">ENTRAR</a>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="cadastro-page">
        <div class="cadastro-container">

            <!-- LADO ESQUERDO -->
            <div class="left-panel">
                <div class="left-content">

                    <h1>Crie sua <span>conta!</span></h1>

                    <p>
                        Preencha seus dados para começar
                        a utilizar a plataforma.
                    </p>

                    <div class="illustration">
                        <img src="ilustracaoCadastro.png" alt="Ilustração de cadastro">
                    </div>

                </div>
            </div>

            <!-- LADO DIREITO -->
            <div class="right-panel">
                <div class="form-box">

                    <h2>Cadastro</h2>

                    <form>

                        <!-- Nome Completo -->
                        <div class="form-group">
                            <label for="nome">Nome Completo</label>
                            <input
                                type="text"
                                id="nome"
                                name="nome"
                                placeholder="Digite seu nome completo"
                                required
                            >
                        </div>

                        <!-- Data de Nascimento -->
                        <div class="form-group">
                            <label for="dataNascimento">Data de Nascimento</label>
                            <input
                                type="date"
                                id="dataNascimento"
                                name="dataNascimento"
                                required
                            >
                        </div>

                        <!-- Sexo -->
                        <div class="form-group">
                            <label for="sexo">Sexo</label>
                            <select
                                id="sexo"
                                name="sexo"
                                required
                            >
                                <option value="">Selecione</option>
                                <option value="feminino">Feminino</option>
                                <option value="masculino">Masculino</option>
                            </select>
                        </div>

                        <!-- E-mail -->
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Digite seu e-mail"
                                required
                            >
                        </div>

                        <!-- Telefone -->
                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input
                                type="tel"
                                id="telefone"
                                name="telefone"
                                placeholder="(00) 00000-0000"
                                required
                            >
                        </div>

                        <!-- CPF -->
                        <div class="form-group">
                            <label for="cpf">CPF</label>
                            <input
                                type="text"
                                id="cpf"
                                name="cpf"
                                placeholder="000.000.000-00"
                                required
                            >
                        </div>

                        <!-- Botão -->
                        <button type="button" class="btn-submit" onclick="irParaTela()">
                         Cadastrar
                        </button>

                    </form>
                </div>
            </div>

        </div>
    </main>
<script src="script.js"></script>
</body>
</html>
